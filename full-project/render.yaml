# render.yaml — deploy both services from one repo on Render
# https://render.com/docs/blueprint-spec

services:
  # ── Backend (Node + Express + Socket.io) ────────────────────────────────────
  - type: web
    name: chat-backend
    runtime: node
    rootDir: full-project/chat-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false          # set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set this manually in Render dashboard

  # ── Frontend (React + Vite → static site) ───────────────────────────────────
  - type: web
    name: chat-frontend
    runtime: static
    rootDir: full-project/chat
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false          # set to your backend Render URL, e.g. https://chat-backend.onrender.com
